<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistem Terpadu Franchise — 5 Brand</title>

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lexend:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Supabase JS SDK via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Stylesheet (catatan: file ini sengaja dipanggil tanpa folder "css/"
       karena semua file di repo GitHub kamu berada rata di root) -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div id="app">
    <div class="loading-screen">
      <div class="loading-spinner"></div>
      <div class="loading-text">Memulai sistem...</div>
    </div>
  </div>

  <!-- ============================================================
       SEMUA MODUL DI-LOAD DALAM SATU HALAMAN INI (bukan iframe).
       Urutan penting: config & utils dulu, baru modul data,
       baru modul UI, dan app.js paling akhir sebagai starter.

       Catatan: path di bawah ini TANPA folder "js/" karena
       struktur repo GitHub kamu saat ini meletakkan semua file
       rata di root (tidak ada subfolder js/css).
       ============================================================ -->

  <!-- Konfigurasi & utilitas dasar -->
  <script src="config.js"></script>
  <script src="utils.js"></script>

  <!-- Modul data (akses Supabase) -->
  <script src="auth.js"></script>
  <script src="brands.js"></script>
  <script src="partners.js"></script>
  <script src="products.js"></script>
  <script src="realtime.js"></script>

  <!-- Modul UI (render halaman) -->
  <script src="ui-login.js"></script>
  <script src="ui-shell.js"></script>
  <script src="ui-mitra.js"></script>
  <script src="ui-produk.js"></script>
  <script src="ui-cs.js"></script>

  <!-- Starter aplikasi -->
  <script src="app.js"></script>

</body>
</html>
